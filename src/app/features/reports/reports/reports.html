<h1 class="page-title animate-fadeUp">📈 Financial Reports</h1>

<div *ngIf="!hasData" class="card empty-state animate-scaleIn">
  <div style="font-size:52px;margin-bottom:16px">📊</div>
  <p style="font-size:16px; color:var(--text-muted)">No data yet. Add some transactions first.</p>
</div>

<div *ngIf="hasData">

  <!-- INSIGHT -->
  <div class="card insight-card animate-fadeUp delay-1">
    <div class="insight-text">{{ insight }}</div>
    <div class="insight-meta">
      <div class="meta-item">
        <span class="meta-label">Top Category</span>
        <span class="meta-value">{{ topCategory }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Savings Rate</span>
        <span class="meta-value" [class.positive]="savingsRate >= 20" [class.negative]="savingsRate < 0">
          {{ savingsRate }}%
        </span>
      </div>
    </div>
  </div>

  <!-- CHARTS GRID -->
  <div class="charts-grid">

    <div class="card chart-card animate-fadeUp delay-2">
      <h3 class="chart-title">Income vs Expenses</h3>
      <div class="chart-wrap">
        <canvas id="doughnutChart"></canvas>
      </div>
    </div>

    <div class="card chart-card animate-fadeUp delay-3">
      <h3 class="chart-title">Expenses by Category</h3>
      <div class="chart-wrap">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="card chart-card full animate-fadeUp delay-4">
      <h3 class="chart-title">Balance Over Time</h3>
      <div class="chart-wrap chart-wrap-wide">
        <canvas id="lineChart"></canvas>
      </div>
    </div>

  </div>

</div>
