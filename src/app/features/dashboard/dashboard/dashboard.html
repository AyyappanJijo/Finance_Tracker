<h2>💰 Financial Dashboard</h2>

<div class="cards">
  <div class="card">
    <h3>Income</h3>
    <p>₹{{ income }}</p>
  </div>

  <div class="card">
    <h3>Expense</h3>
    <p>₹{{ expense }}</p>
  </div>

  <div class="card">
    <h3>Balance</h3>
    <p>₹{{ balance }}</p>
  </div>
</div>

<div class="insight">
  {{ insight }}
</div>

<h3>Recent Transactions</h3>

<div *ngIf="recent.length; else empty">
  <div *ngFor="let t of recent" class="item">
    <span>{{ t.title }}</span>
    <span>₹{{ t.amount }}</span>
    <span>{{ t.type }}</span>
  </div>
</div>

<ng-template #empty>
  <div class="empty">No transactions yet 🚀</div>
</ng-template>
