<h2>💳 Add Transaction</h2>

<div class="summary">
  <div class="card">
    <h4>Preview Balance</h4>
    <p>₹{{ previewBalance }}</p>
  </div>

  <div class="card">
    <h4>This Month Expense</h4>
    <p>₹{{ monthlyExpense }}</p>
  </div>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <input type="text" placeholder="Title" formControlName="title" />
  <div *ngIf="title?.touched && title?.invalid">Required</div>

  <input type="number" placeholder="Amount" formControlName="amount" />
  <div *ngIf="amount?.touched && amount?.invalid">Invalid</div>

  <select formControlName="type">
    <option value="expense">Expense</option>
    <option value="income">Income</option>
  </select>

  <select formControlName="category">
    <option value="">Select Category</option>
    <option *ngFor="let c of categories">{{ c }}</option>
  </select>

  <input type="date" formControlName="date" />

  <button type="submit">Add Transaction</button>

</form>

<div class="success" *ngIf="message">
  {{ message }}
</div>
